<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Planos de Aula - Academia Nacional de Polícia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f2044 0%, #1e3a72 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            margin-bottom: 30px;
            font-size: 1.2em;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #c8a84b;
            color: #0f2044;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #e8c96b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .logo {
            margin-bottom: 30px;
        }
        .badge {
            display: inline-block;
            background: rgba(200, 168, 75, 0.2);
            color: #c8a84b;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .countdown {
            font-size: 0.9em;
            opacity: 0.7;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div style="width: 60px; height: 60px; background: #c8a84b; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #0f2044; margin-bottom: 10px;">
                DPF
            </div>
        </div>
        
        <div class="badge">Academia Nacional de Polícia</div>
        
        <h1>Sistema de Planos de Aula</h1>
        
        <p>
            Sistema completo para criação e gerenciamento de planos de aula dos cursos de formação da Polícia Federal.
        </p>
        
        <a href="sistema_planos.html" class="btn">Acessar Sistema</a>
        
        <div class="countdown">
            Redirecionamento automático em <span id="countdown">5</span> segundos...
        </div>
    </div>

    <script>
        let count = 5;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            count--;
            countdownElement.textContent = count;
            
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = 'sistema_planos.html';
            }
        }, 1000);
        
        // Para o redirecionamento se o usuário clicar no link
        document.querySelector('.btn').addEventListener('click', () => {
            clearInterval(timer);
        });
    </script>
</body>
</html>
