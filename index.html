<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Planos de Aula - Academia Nacional de Polícia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f2044 0%, #1e3a72 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            margin-bottom: 30px;
            font-size: 1.2em;
            opacity: 0.9;
        }
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 28px;
            background: #c8a84b;
            color: #0f2044;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.05em;
            transition: all 0.3s ease;
            min-width: 200px;
            justify-content: center;
        }
        .btn:hover {
            background: #e8c96b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn.secondary {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.4);
        }
        .btn.secondary:hover {
            background: rgba(255,255,255,0.25);
            border-color: #fff;
        }
        .logo {
            margin-bottom: 30px;
        }
        .badge {
            display: inline-block;
            background: rgba(200, 168, 75, 0.2);
            color: #c8a84b;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
    </style>
</head>

        <div class="logo">
            <div style="width: 60px; height: 60px; background: #c8a84b; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #0f2044; margin-bottom: 10px;">
                DPF
            </div>
        </div>
        
        <div class="badge">Academia Nacional de Polícia</div>
        
        <h1>Sistema de Planos de Aula</h1>
